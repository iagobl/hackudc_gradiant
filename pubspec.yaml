name: hackudc_gradiant
description: "Application for HackUDC, with the challenge proposed by Gradiant"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  cryptography: ^2.7.0
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.2
  path: ^1.9.0
  http: ^1.2.2
  crypto: ^3.0.3


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.10

flutter:

  uses-material-design: true