<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kryptos - PassGen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #ffffff;
      --surface:  #f8fafc;
      --card:     #f1f5f9;
      --border:   #e2e8f0;
      --accent:   #3b82f6;
      --accent2:  #2563eb;
      --accent3:  #93c5fd;
      --glow:     rgba(59,130,246,0.15);
      --danger:   #ef4444;
      --warn:     #f59e0b;
      --ok:       #10b981;
      --text:     #1e293b;
      --muted:    #94a3b8;
      --radius:   10px;
    }

    html, body {
      color-scheme: light;
      background-color: #ffffff !important;
    }

    body {
      width: 360px;
      min-height: 520px;
      background: #ffffff !important;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      overflow-x: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px 11px;
      border-bottom: 1px solid var(--border);
      background: #ffffff;
    }
    .logo {
      width: 30px; height: 30px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 12px var(--glow);
    }
    .logo img { width: 30px; height: 30px; object-fit: cover; display: block; }
    .header-text { display: flex; flex-direction: column; gap: 1px; }
    .header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 12px; font-weight: 700;
      letter-spacing: .08em;
      color: var(--text);
      line-height: 1;
    }
    .header h1 span { color: var(--accent); }
    .header-sub { font-size: 10px; color: var(--muted); letter-spacing: .04em; }

    .pw-box {
      margin: 14px 16px 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 12px 10px;
      transition: box-shadow .25s, border-color .25s;
    }
    .pw-box.has-password {
      box-shadow: 0 0 18px var(--glow);
      border-color: rgba(59,130,246,.35);
    }

    .pw-row { display: flex; align-items: flex-start; gap: 8px; }
    .pw-text {
      flex: 1;
      font-family: 'Space Mono', monospace;
      font-size: 14px; font-weight: 700;
      letter-spacing: .08em;
      word-break: break-all;
      color: var(--accent2);
      min-height: 20px;
      line-height: 1.5;
    }
    .pw-text.placeholder {
      color: var(--muted); font-weight: 400;
      font-size: 12px; letter-spacing: 0;
      font-family: 'DM Sans', sans-serif;
      margin-top: 2px;
    }

    .btn-icon {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px; border-radius: 6px;
      display: grid; place-items: center;
      transition: color .15s, background .15s;
      flex-shrink: 0; margin-top: 1px;
    }
    .btn-icon:hover { color: var(--accent2); background: rgba(59,130,246,.1); }
    .btn-icon:disabled { opacity: .3; cursor: default; }
    .btn-icon svg { width: 17px; height: 17px; }

    .strength { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .bar-track { flex: 1; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .bar-fill {
      height: 100%; border-radius: 99px;
      transition: width .4s ease, background .4s ease;
      width: 0%;
    }
    .strength-label { font-size: 11px; font-weight: 600; min-width: 68px; text-align: right; color: var(--muted); }

    .params { padding: 14px 16px 8px; display: flex; flex-direction: column; }

    .section-title {
      font-size: 10px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px; margin-top: 4px;
    }

    .slider-wrap { margin-bottom: 14px; }
    .slider-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .slider-header label { font-size: 12.5px; color: var(--text); }
    .slider-header .val {
      font-family: 'Space Mono', monospace;
      font-size: 13px; font-weight: 700;
      color: var(--accent2);
      background: rgba(59,130,246,.1);
      padding: 1px 8px; border-radius: 5px;
    }

    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 3px;
      background: var(--border); border-radius: 99px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      box-shadow: 0 0 0 3px rgba(59,130,246,.25);
      transition: box-shadow .15s;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 5px rgba(59,130,246,.3);
    }

    .toggles { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }

    .toggle-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
      cursor: pointer; transition: border-color .15s, background .15s;
      user-select: none;
    }
    .toggle-item:hover { border-color: rgba(59,130,246,.4); background: rgba(59,130,246,.04); }
    .toggle-item.active { border-color: rgba(59,130,246,.45); background: rgba(59,130,246,.06); }
    .toggle-label { font-size: 12px; color: var(--text); }

    .switch {
      width: 28px; height: 16px; border-radius: 99px;
      background: var(--border); position: relative;
      transition: background .2s; flex-shrink: 0;
    }
    .switch::after {
      content: ''; position: absolute;
      top: 2px; left: 2px;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--muted); transition: transform .2s, background .2s;
    }
    .toggle-item.active .switch,
    .toggle-full.active .switch { background: rgba(59,130,246,.3); }
    .toggle-item.active .switch::after,
    .toggle-full.active .switch::after { transform: translateX(12px); background: var(--accent2); }

    .toggle-full {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 10px;
      cursor: pointer; margin-bottom: 14px;
      transition: border-color .15s, background .15s;
      user-select: none; gap: 12px;
    }
    .toggle-full:hover { border-color: rgba(59,130,246,.4); background: rgba(59,130,246,.04); }
    .toggle-full.active { border-color: rgba(59,130,246,.45); background: rgba(59,130,246,.06); }
    .toggle-full .tlabel { font-size: 12px; color: var(--text); }
    .toggle-full .tsub { font-size: 10.5px; color: var(--muted); margin-top: 2px; }

    .counters { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .counter-row {
      display: flex; align-items: center;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 10px; gap: 8px;
      transition: opacity .2s;
    }
    .counter-row.disabled { opacity: .35; pointer-events: none; }
    .counter-row label { flex: 1; font-size: 12px; }

    .counter-btns { display: flex; align-items: center; gap: 4px; }
    .btn-counter {
      background: var(--border); border: none; cursor: pointer;
      color: var(--text); border-radius: 6px;
      width: 24px; height: 24px; display: grid; place-items: center;
      font-size: 16px; line-height: 1;
      transition: background .15s, color .15s;
      font-family: 'Space Mono', monospace;
    }
    .btn-counter:hover { background: var(--accent); color: #fff; }
    .counter-val {
      font-family: 'Space Mono', monospace;
      font-size: 13px; font-weight: 700;
      min-width: 22px; text-align: center; color: var(--accent2);
    }

    .footer { padding: 8px 16px 14px; border-top: 1px solid var(--border); background: #ffffff; }
    .btn-generate {
      width: 100%; height: 44px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6, #60a5fa);
      border: none; border-radius: var(--radius);
      font-family: 'Space Mono', monospace;
      font-size: 13px; font-weight: 700;
      color: #fff; cursor: pointer;
      letter-spacing: .1em;
      transition: opacity .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 4px 20px rgba(59,130,246,.35);
    }
    .btn-generate:hover { opacity: .9; box-shadow: 0 4px 28px rgba(59,130,246,.5); }
    .btn-generate:active { transform: scale(.98); }

    .toast {
      position: fixed; bottom: 62px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--accent); color: #fff;
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
      padding: 6px 16px; border-radius: 99px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(59,130,246,.45);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo"><img src="icons/icon48.png" alt="Kryptos" /></div>
  <div class="header-text">
    <h1>KRYPTOS <span>· PASSGEN</span></h1>
    <div class="header-sub">generador de contraseñas seguro</div>
  </div>
</div>

<div class="pw-box" id="pwBox">
  <div class="pw-row">
    <div class="pw-text placeholder" id="pwDisplay">Pulsa «Generar»</div>
    <button class="btn-icon" id="btnCopy" disabled title="Copiar contraseña">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>
  </div>
  <div class="strength">
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <div class="strength-label" id="strengthLabel">—</div>
  </div>
</div>

<div class="params">

  <div class="section-title" style="margin-top:2px">Longitud</div>
  <div class="slider-wrap">
    <div class="slider-header">
      <label for="sliderLen">Caracteres</label>
      <span class="val" id="lenVal">16</span>
    </div>
    <input type="range" id="sliderLen" min="8" max="64" value="16" step="1" />
  </div>

  <div class="section-title">Tipos de caracteres</div>
  <div class="toggles">
    <div class="toggle-item active" id="togUpper">
      <span class="toggle-label">Mayúsculas</span><div class="switch"></div>
    </div>
    <div class="toggle-item active" id="togLower">
      <span class="toggle-label">Minúsculas</span><div class="switch"></div>
    </div>
    <div class="toggle-item active" id="togDigits">
      <span class="toggle-label">Números</span><div class="switch"></div>
    </div>
    <div class="toggle-item active" id="togSymbols">
      <span class="toggle-label">Símbolos</span><div class="switch"></div>
    </div>
  </div>

  <div class="toggle-full active" id="togAmbiguous">
    <div>
      <div class="tlabel">Evitar caracteres confusos</div>
      <div class="tsub">Excluye O, 0, I, l, 1 para mayor legibilidad</div>
    </div>
    <div class="switch"></div>
  </div>

  <div class="section-title">Mínimos garantizados</div>
  <div class="counters">
    <div class="counter-row" id="rowMinDigits">
      <label>Mínimo números</label>
      <div class="counter-btns">
        <button class="btn-counter" id="decDigits">−</button>
        <span class="counter-val" id="valMinDigits">1</span>
        <button class="btn-counter" id="incDigits">+</button>
      </div>
    </div>
    <div class="counter-row" id="rowMinSymbols">
      <label>Mínimo símbolos</label>
      <div class="counter-btns">
        <button class="btn-counter" id="decSymbols">−</button>
        <span class="counter-val" id="valMinSymbols">1</span>
        <button class="btn-counter" id="incSymbols">+</button>
      </div>
    </div>
  </div>

</div>

<div class="footer">
  <button class="btn-generate" id="btnGenerate">GENERAR</button>
</div>

<div class="toast" id="toast">✓ Copiado al portapapeles</div>

<script src="popup.js"></script>
</body>
</html>
